<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — Leonardo Po</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body class="bg-slate-50 text-slate-900 antialiased">
  <!-- Navbar -->
  <nav class="fixed top-0 w-full bg-white border-b border-slate-200 z-50">
    <div class="max-w-4xl mx-auto flex justify-between items-center h-14 px-4 md:px-6">
      <a href="../index.html" class="text-base font-semibold tracking-tight text-slate-900">Leonardo Po</a>
      <button id="mobileMenuBtn" class="md:hidden p-2 -mr-2 text-slate-600 hover:text-slate-900">
        <i class="fas fa-bars text-lg"></i>
      </button>
      <ul class="hidden md:flex items-center space-x-1">
        <li>
          <a href="../index.html" class="px-3 py-2 text-base font-medium text-slate-600 hover:text-slate-900 hover:bg-slate-50 rounded transition-colors">About</a>
        </li>
        <li>
          <a href="projects.html" class="px-3 py-2 text-base font-medium text-slate-900 bg-slate-100 rounded">Projects</a>
        </li>
        <li>
          <a href="cv.html" class="px-3 py-2 text-base font-medium text-slate-600 hover:text-slate-900 hover:bg-slate-50 rounded transition-colors">CV</a>
        </li>
      </ul>
    </div>
    <div id="mobileMenu" class="max-h-0 overflow-hidden transition-all duration-200 md:hidden bg-white border-t border-slate-200">
      <ul class="flex flex-col py-2 px-4">
        <li><a href="../index.html" class="block py-2 text-base font-medium text-slate-600 hover:text-slate-900">About</a></li>
        <li><a href="projects.html" class="block py-2 text-base font-medium text-slate-900">Projects</a></li>
        <li><a href="cv.html" class="block py-2 text-base font-medium text-slate-600 hover:text-slate-900">CV</a></li>
      </ul>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-4 md:px-6 pt-20 pb-16">
    <div id="projects" class="space-y-6"></div>
  </main>

  <script>
    const mobileMenuBtn = document.getElementById("mobileMenuBtn");
    const mobileMenu = document.getElementById("mobileMenu");
    mobileMenuBtn.addEventListener("click", () => {
      mobileMenu.classList.toggle("max-h-0");
      mobileMenu.classList.toggle("max-h-48");
      const icon = mobileMenuBtn.querySelector("i");
      icon.classList.toggle("fa-bars");
      icon.classList.toggle("fa-times");
    });

    const maxIframeLevel = 2;
    const urlParams = new URLSearchParams(window.location.search);
    const currentLevel = Math.abs(parseInt(urlParams.get("iframeLevel")) || 0);
    document.querySelectorAll("a[href]").forEach(link => {
      link.href = link.href.split("?")[0] + `?iframeLevel=${currentLevel}`;
    });

    const iconsMap = {
      html: "../assets/icons/html.svg",
      css: "../assets/icons/css.svg",
      js: "../assets/icons/javascript.svg",
      ts: "../assets/icons/typescript.svg",
      java: "../assets/icons/java.svg",
      c: "../assets/icons/c.svg",
      "c++": "../assets/icons/c++.svg",
      "csharp": "../assets/icons/csharp.svg",
      python: "../assets/icons/python.svg",
      mongodb: "../assets/icons/mongodb.svg",
      mssql: "../assets/icons/mssql.svg",
      fastapi: "../assets/icons/FastAPI.svg",
      aspnet: "../assets/icons/aspnet.svg",
      angular: "../assets/icons/angular.svg",
      node: "../assets/icons/nodejs.svg",
      react: "../assets/icons/react.svg",
      numpy: "../assets/icons/NumPy.svg",
      pandas: "../assets/icons/Pandas.svg",
      tailwind: "../assets/icons/tailwind.svg",
      keras: "../assets/icons/keras.svg",
      bootstrap: "../assets/icons/bootstrap.svg",
    };

    const projects = [
      {
        title: "Selfie",
        description: "Full-stack productivity app with calendar, Pomodoro timer, and Markdown notes.",
        context: "MERN stack project",
        tech: ["react", "ts", "node", "mongodb"],
        github: "https://github.com/leonardo3130/Selfie",
      },
      {
        title: "Tradisk",
        description: "Web app for EVE Online players to explore in-game financial markets.",
        context: "Built with Agile practices",
        tech: ["react", "ts", "python", "fastapi"],
      },
      {
        title: "µPandOS",
        description: "Educational microkernel OS with message-passing synchronization.",
        context: "Operating Systems",
        tech: ["c"],
        github: "https://github.com/leonardo3130/MicroPandOS",
      },
      {
        title: "CIFAR-10 Overlap Classification",
        description: "CNN model to predict labels of 2 overlapping CIFAR-10 images.",
        context: "Deep Learning project",
        tech: ["python", "keras", "pandas", "numpy"],
        github: "https://github.com/leonardo3130/project_AA",
      },
      {
        title: "Connect X AI",
        description: "AI agent using minimax with heuristics for generalized Connect 4.",
        context: "Algorithms course",
        tech: ["java"],
        github: "https://github.com/leonardo3130/connectx",
      },
      {
        title: "1 vs All-phabet",
        description: "ASCII graphics game with procedural level generation.",
        context: "Game development project",
        tech: ["c++"],
        github: "https://github.com/leonardo3130/1-VS-All-phabet",
      },
      {
        title: "This Website",
        description: "I love recursion !!",
        url: currentLevel < maxIframeLevel
          ? window.location.href.split("?")[0] + `?iframeLevel=${currentLevel + 1}`
          : null,
        tech: ["html", "css", "js", "tailwind"],
        github: "https://github.com/leonardo3130/leonardo3130.github.io",
      },
    ];

    function buildTechList(tech) {
      return tech.map(t => `<img class="h-6 w-6" src="${iconsMap[t]}" alt="${t}" title="${t}">`).join("");
    }

    function renderProjects() {
      const container = document.getElementById("projects");
      container.innerHTML = projects.map((p, i) => `
        <article class="group ${p.url ? 'col-span-full' : ''}">
          ${p.url ? `
            <div class="relative w-full aspect-video mb-3 rounded border border-slate-200 overflow-hidden bg-white">
              <iframe src="${p.url}" class="absolute inset-0 w-full h-full" loading="lazy"></iframe>
            </div>
          ` : p.title === "This Website" && !p.url ? `
            <p class="text-sm text-slate-500 mb-2">Max recursion depth reached</p>
          ` : ''}
          <div class="flex items-start justify-between gap-4">
            <div class="min-w-0 flex-1">
              <div class="flex items-center gap-2 mb-1">
                <h3 class="text-base font-semibold text-slate-900">${p.title}</h3>
                ${p.context ? `<span class="text-sm text-slate-500">· ${p.context}</span>` : ''}
              </div>
              <p class="text-base text-slate-600 mb-2">${p.description}</p>
              <div class="flex items-center gap-3">
                <div class="flex items-center gap-2">${buildTechList(p.tech)}</div>
                ${p.github ? `<a href="${p.github}" class="text-slate-400 hover:text-slate-900 transition-colors text-lg" target="_blank" rel="noopener"><i class="fab fa-github"></i></a>` : ''}
              </div>
            </div>
          </div>
          ${i < projects.length - 1 ? '<hr class="mt-6 border-slate-200">' : ''}
        </article>
      `).join("");
    }

    renderProjects();
  </script>
</body>

</html>
